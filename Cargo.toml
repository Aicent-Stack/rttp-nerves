[package]
name = "rttp"
description = "RTTP: Sub-millisecond Neural Transport Protocol [RFC-002]"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# --- High-Performance Primitives ---
serde = { workspace = true, features = ["derive"] }
anyhow.workspace = true
bytes.workspace = true
tokio = { workspace = true, features = ["net", "rt", "sync"] }
smallvec.workspace = true
crossbeam.workspace = true
once_cell.workspace = true

[features]
default = ["std"]
std = ["serde/std", "anyhow/std"]
# [RFC-002] Placeholder for future XDP/DPDK acceleration features
hardware-accelerated = []
