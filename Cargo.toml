[package]
name = "rttp"
description = "RTTP: Sub-millisecond Neural Transport Protocol [RFC-002]"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# --- The Reflex Trinity ---
rpki = { workspace = true }
zcmk = { workspace = true }

# --- Primitives ---
serde = { workspace = true, features = ["derive"] }
anyhow.workspace = true
bytes.workspace = true
tokio = { workspace = true, features = ["net", "rt", "sync"] }
smallvec.workspace = true
crossbeam.workspace = true

[features]
default = ["std"]
std = ["serde/std", "anyhow/std"]
# 🛡️ Fix: Removed the undefined no-std-compat and left it empty for future expansion.
embedded = []
