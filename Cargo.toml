[package]
name = "rttp"
description = "RTTP: Sub-millisecond Neural Transport Protocol [RFC-002]"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# 🛡️ Core fix: Completely removes rpki and zcmk dependencies, breaking the cycle.
serde = { workspace = true, features = ["derive"] }
anyhow.workspace = true
bytes.workspace = true
tokio = { workspace = true, features = ["net", "rt", "sync"] }
smallvec.workspace = true
crossbeam.workspace = true

[features]
default = ["std"]
std = ["serde/std", "anyhow/std"]
embedded = []
